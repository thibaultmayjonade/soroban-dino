<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Soroban Dino 🦕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a3a1a;min-height:100vh;display:flex;justify-content:center;}
.app{width:100%;max-width:480px;min-height:100vh;background:#fff;display:flex;flex-direction:column;}
.hdr{background:linear-gradient(135deg,#e85d04,#f48c06);padding:14px 20px 12px;color:#fff;text-align:center;position:relative;overflow:hidden;flex-shrink:0;}
.hdr::after{content:'🦕';position:absolute;right:12px;top:8px;font-size:44px;opacity:.18;pointer-events:none;}
.hdr h1{font-size:20px;font-weight:800;}
.hdr-stats{display:flex;justify-content:center;gap:20px;margin-top:6px;}
.hdr-stat{font-size:12px;opacity:.9;}
.hdr-stat span{font-weight:700;font-size:14px;}
.nav{display:flex;border-bottom:2px solid #f0f0f0;flex-shrink:0;}
.nav-btn{flex:1;padding:10px 4px;background:none;border:none;border-bottom:3px solid transparent;font-size:11px;font-weight:600;color:#aaa;cursor:pointer;transition:.2s;}
.nav-btn.active{color:#e85d04;border-color:#e85d04;}
.main{flex:1;overflow-y:auto;padding:16px;}
.screen{display:none;}
.screen.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---- SOROBAN ---- */
.soroban-outer{
  background:linear-gradient(160deg,#f5d080,#c08010);
  border-radius:14px;border:5px solid #7a4f00;
  padding:10px 8px 6px;margin:12px 0;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  user-select:none;-webkit-user-select:none;
}
.soroban-bar{height:10px;background:#7a4f00;border-radius:6px;margin:5px 0;}
.soroban-rods{display:flex;justify-content:center;align-items:flex-start;gap:6px;}
.rod-wrap{display:flex;flex-direction:column;align-items:center;}
.rod-col{position:relative;width:42px;height:244px;}
.rod-stick{position:absolute;left:50%;transform:translateX(-50%);width:4px;top:0;bottom:30px;background:#5a3800;border-radius:2px;z-index:0;}
.heaven-zone{position:absolute;top:0;left:0;right:0;height:70px;}
.rod-divider{position:absolute;top:70px;left:0;right:0;height:5px;background:#5a3800;border-radius:2px;z-index:2;}
.earth-zone{position:absolute;top:75px;left:0;right:0;height:160px;}
.bead-h,.bead-e{
  position:absolute;left:50%;transform:translateX(-50%);
  width:34px;height:34px;border-radius:50%;
  cursor:pointer;z-index:1;
  transition:top .2s cubic-bezier(.4,0,.2,1),box-shadow .15s,background .15s;
  display:flex;align-items:center;justify-content:center;
}
.bead-h{
  background:radial-gradient(circle at 35% 35%,#ff9090,#cc2020);
  border:2px solid #991010;
  box-shadow:0 2px 6px rgba(0,0,0,.35),inset 0 1px 3px rgba(255,200,200,.5);
}
.bead-h.active{
  background:radial-gradient(circle at 35% 35%,#ff4040,#990000);
  box-shadow:0 3px 12px rgba(200,0,0,.5),inset 0 1px 2px rgba(255,150,150,.5);
}
.bead-e{
  background:radial-gradient(circle at 35% 35%,#ffc070,#d06000);
  border:2px solid #a04800;
  box-shadow:0 2px 6px rgba(0,0,0,.3),inset 0 1px 3px rgba(255,220,160,.5);
}
.bead-e.active{
  background:radial-gradient(circle at 35% 35%,#ff9820,#b84000);
  box-shadow:0 3px 12px rgba(200,80,0,.45),inset 0 1px 2px rgba(255,180,80,.5);
}
.bead-h:active,.bead-e:active{transform:translateX(-50%) scale(1.12);}
.rod-label{font-size:9px;font-weight:700;color:#5a3800;margin-top:4px;text-align:center;}
.soroban-val{text-align:center;font-size:28px;font-weight:800;color:#5a3800;margin-top:6px;min-height:38px;letter-spacing:1px;}

/* ---- CHALLENGE UI ---- */
.ch-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;}
.ch-world-tag{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;color:#fff;white-space:nowrap;}
.ch-err-tag{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:#f0f0f0;color:#777;}
.pbar{height:10px;background:#eee;border-radius:8px;overflow:hidden;margin-bottom:12px;}
.pfill{height:100%;background:linear-gradient(90deg,#e85d04,#f48c06);width:0%;transition:.4s;}
.qbox{background:#f8f9fa;border-radius:14px;padding:16px;text-align:center;margin-bottom:12px;border:2px solid #eee;}
.q-tag{font-size:11px;font-weight:700;text-transform:uppercase;color:#aaa;margin-bottom:6px;letter-spacing:.5px;}
.q-main{font-size:38px;font-weight:800;color:#222;line-height:1.1;}
.q-sub{font-size:13px;color:#666;margin-top:6px;}
.q-hint{font-size:12px;color:#e85d04;margin-top:6px;font-weight:600;}
.feedback{padding:13px;border-radius:12px;text-align:center;font-size:14px;font-weight:700;margin-bottom:10px;display:none;}
.feedback.ok{background:#d1fae5;color:#065f46;display:block;}
.feedback.ko{background:#fee2e2;color:#991b1b;display:block;}
.ans-row{display:flex;gap:8px;margin-bottom:10px;}
.ans-input{flex:1;padding:13px;border:2px solid #ddd;border-radius:10px;font-size:22px;font-weight:700;text-align:center;}
.ans-input:focus{outline:none;border-color:#e85d04;}
.btn-ok{flex:1;padding:13px;background:linear-gradient(135deg,#e85d04,#f48c06);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-ok:active{transform:scale(.97);}
.btn-check{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;}
.btn-back{width:100%;padding:11px;background:#f0f0f0;color:#666;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
.chrono{text-align:center;font-size:44px;font-weight:800;color:#e85d04;margin:2px 0 10px;}
.chrono.danger{color:#dc2626;animation:pulse .5s infinite;}
@keyframes pulse{50%{opacity:.4}}
.qcm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.qcm-btn{padding:20px 8px;border:2px solid #ddd;border-radius:12px;background:#fafafa;font-size:26px;font-weight:800;cursor:pointer;text-align:center;transition:.15s;}
.qcm-btn:hover:not(:disabled){border-color:#e85d04;background:#fff8f4;}
.qcm-btn.correct{background:#d1fae5;border-color:#34d399;color:#065f46;}
.qcm-btn.wrong{background:#fee2e2;border-color:#f87171;color:#991b1b;}
.seq-steps{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:8px 0;}
.seq-step{width:50px;height:50px;border-radius:10px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#aaa;border:2px solid #ddd;}
.seq-step.curr{background:#e85d04;color:#fff;border-color:#c04000;}
.seq-step.done{background:#d1fae5;color:#065f46;border-color:#34d399;}

/* ---- WORLD MAP ---- */
.world-card{border-radius:14px;margin-bottom:12px;border:2px solid #eee;overflow:hidden;}
.world-card.locked{opacity:.5;}
.world-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
.world-icon{font-size:32px;flex-shrink:0;}
.world-info{flex:1;min-width:0;}
.world-name{font-size:15px;font-weight:700;color:#222;}
.world-sub{font-size:12px;color:#777;margin-top:2px;}
.world-pbar{margin-top:6px;height:6px;background:#eee;border-radius:4px;overflow:hidden;}
.world-pfill{height:100%;border-radius:4px;transition:.4s;}
.world-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;color:#fff;flex-shrink:0;}
.world-chs{padding:0 16px 12px;display:none;}
.world-chs.open{display:block;}
.ch-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;margin-bottom:8px;border-radius:10px;border:2px solid #eee;background:#fafafa;cursor:pointer;transition:.15s;}
.ch-row:hover:not(.locked){border-color:#e85d04;background:#fff8f4;}
.ch-row.done{background:linear-gradient(90deg,#d1fae5,#a7f3d0);border-color:#34d399;}
.ch-row.locked{opacity:.4;cursor:not-allowed;pointer-events:none;}
.ch-row-name{font-size:13px;font-weight:600;color:#333;}
.ch-row.done .ch-row-name{color:#065f46;}
.ch-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;color:#fff;flex-shrink:0;}

/* ---- REWARDS / STATS ---- */
.section-title{font-size:15px;font-weight:700;color:#333;margin:16px 0 10px;}
.streak-banner{background:linear-gradient(135deg,#fff3cd,#ffd966);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:8px;border:2px solid #f0b800;}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;}
.badge-item{border-radius:12px;border:2px solid #eee;padding:12px 8px;text-align:center;background:#fafafa;}
.badge-item.ok{background:linear-gradient(135deg,#fffbeb,#fde68a);border-color:#f59e0b;}
.badge-em{font-size:32px;margin-bottom:4px;}
.badge-name{font-size:11px;font-weight:700;color:#444;}
.badge-cond{font-size:10px;color:#888;margin-top:2px;}
.mission-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:10px;border:2px solid #eee;background:#fafafa;margin-bottom:8px;}
.mission-item.done{background:#d1fae5;border-color:#34d399;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-box{background:#f8f9fa;border-radius:12px;padding:14px;text-align:center;border:2px solid #eee;}
.stat-val{font-size:28px;font-weight:800;color:#e85d04;}
.stat-label{font-size:11px;color:#777;font-weight:600;margin-top:2px;}

/* ---- MODAL ---- */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal.open{display:flex;}
.modal-box{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;width:100%;animation:popin .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popin{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal-em{font-size:72px;margin-bottom:12px;}
.modal-title{font-size:22px;font-weight:800;color:#222;margin-bottom:8px;}
.modal-pts{font-size:32px;font-weight:800;color:#e85d04;margin-bottom:12px;display:none;}
.modal-text{font-size:14px;color:#666;margin-bottom:20px;line-height:1.5;}

/* ---- CONFETTI ---- */
.cpiece{position:fixed;width:8px;height:14px;border-radius:3px;pointer-events:none;z-index:200;animation:cfall linear forwards;}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ---- COULEURS MONDES ---- */
.c1{background:#1e7e34}.c2{background:#0275d8}.c3{background:#9b59b6}.c4{background:#e67e22}
.c5{background:#e74c3c}.c6{background:#16a085}.c7{background:#8e44ad}.c8{background:#c0392b}
.c9{background:#2c3e50}.c10{background:#b7950b}
.b1{border-color:#1e7e34!important}.b2{border-color:#0275d8!important}.b3{border-color:#9b59b6!important}
.b4{border-color:#e67e22!important}.b5{border-color:#e74c3c!important}.b6{border-color:#16a085!important}
.b7{border-color:#8e44ad!important}.b8{border-color:#c0392b!important}.b9{border-color:#2c3e50!important}
.b10{border-color:#b7950b!important}
</style>
</head>

  </div>
</div>
<div class="modal" id="modal">

  </div>
</div>

//  SOROBAN MOTEUR
// =============================================================
function numRods(n){return Math.max(2,String(Math.abs(Math.floor(n||0))).length);}

function initSoroban(preset){
  const nc=numRods(preset!=null?preset:0);
  soroban=[];
  for(let i=0;i<nc;i++){
    if(preset!=null){
      const s=String(Math.abs(Math.floor(preset))).padStart(nc,'0');
      const d=parseInt(s[i]);
      soroban.push({heaven:d>=5,earth:d%5});
    }else{
      soroban.push({heaven:false,earth:0});
    }
  }
}

function getSorobanVal(){
  let v=0;
  soroban.forEach((r,i)=>{
    const p=Math.pow(10,soroban.length-1-i);
    v+=(r.heaven?5:0)*p+r.earth*p;
  });
  return v;
}

function clickHeaven(ri){
  soroban[ri].heaven=!soroban[ri].heaven;
  updateRodDOM(ri);beadSnd();updateValDisplay();
}

function clickEarth(ri,bi){
  const cur=soroban[ri].earth;
  soroban[ri].earth=(bi<cur)?bi:bi+1;
  updateRodDOM(ri);beadSnd();updateValDisplay();
}

function updateRodDOM(ri){
  const rod=soroban[ri];
  const rEl=document.querySelector(`.rod-col[data-ri="${ri}"]`);
  if(!rEl)return;
  const hEl=rEl.querySelector('.bead-h');
  if(hEl){hEl.style.top=hTop(rod.heaven)+'px';hEl.classList.toggle('active',rod.heaven);}
  rEl.querySelectorAll('.bead-e').forEach((el,bi)=>{
    el.style.top=eTop(bi,rod.earth)+'px';
    el.classList.toggle('active',bi<rod.earth);
  });
}

function updateValDisplay(){
  const el=document.getElementById('sorobanVal');
  if(!el)return;
  el.textContent=(ACT&&ACT.hideVal)?'?':getSorobanVal();
}

function buildSorobanHTML(preset,hideVal){
  initSoroban(preset);
  const nc=soroban.length;
  const PLACES=['10⁴','10³','10²','10¹','10⁰'];
  const start=5-nc;
  let rods='';
  for(let i=0;i<nc;i++){
    const r=soroban[i];
    let eBeads='';
    for(let bi=0;bi<4;bi++){
      const top=eTop(bi,r.earth);
      eBeads+=`<div class="bead-e${bi<r.earth?' active':''}" style="top:${top}px" onclick="clickEarth(${i},${bi})"></div>`;
    }
    rods+=`<div class="rod-wrap">
      <div class="rod-col" data-ri="${i}">
        <div class="rod-stick"></div>
        <div class="heaven-zone">
          <div class="bead-h${r.heaven?' active':''}" style="top:${hTop(r.heaven)}px" onclick="clickHeaven(${i})"></div>
        </div>
        <div class="rod-divider"></div>
        <div class="earth-zone">${eBeads}</div>
      </div>
      <div class="rod-label">${PLACES[start+i]}</div>
    </div>`;
  }
  return `<div class="soroban-outer">
    <div class="soroban-bar"></div>
    <div class="soroban-rods">${rods}</div>
    <div class="soroban-bar"></div>
    <div class="soroban-val" id="sorobanVal">${hideVal?'?':getSorobanVal()}</div>
  </div>`;
}

  if(v===n){
    const ve=document.getElementById('sorobanVal');if(ve)ve.textContent=n;
    ACT.seqIdx++;setPf(Math.round(100*ACT.seqIdx/ch.seq.length));
    if(ACT.seqIdx>=ch.seq.length){setTimeout(chSuccess,700);}
    else{fb.className='feedback ok';fb.textContent='✅ Suivant !';setTimeout(()=>rSeqStep(ch,ACT.world),700);}
  }else{
    ACT.attempts++;ACT.perfect=false;setErr(ACT.attempts);
    fb.className='feedback ko';fb.textContent='❌ Regarde bien les boules !';errSnd();
    const ain=document.getElementById('ain');if(ain){ain.value='';ain.focus();}
  }
}

// =============================================================
//  FSEQ — série de nombres à former sur le soroban
// =============================================================
function rFSeq(ch,world){ACT.seqIdx=0;rFSeqStep(ch,world);}
function rFSeqStep(ch,world){
  ACT.hideVal=false;
  const idx=ACT.seqIdx,n=ch.seq[idx];
  const steps=ch.seq.map((s,i)=>`<div class="seq-step${i===idx?' curr':i<idx?' done':''}">${i<idx?'✓':s}</div>`).join('');
  document.getElementById('challArea').innerHTML=`${chHdr(ch,world)}
    <div class="qbox">
      <div class="q-tag">✍️ Formation ${idx+1}/${ch.seq.length}</div>
      <div class="q-main">${n}</div>
      <div class="q-sub">${ch.label}</div>
      <div class="seq-steps">${steps}</div>
    </div>
    ${buildSorobanHTML(null,false)}
    <div class="feedback" id="fb"></div>
    <button class="btn-check" onclick="checkFSeqStep()">✓ Vérifier</button>
    <button class="btn-back" onclick="goNav(0)">← Retour</button>`;
}
function checkFSeqStep(){
  const v=getSorobanVal(),ch=ACT.ch,n=ch.seq[ACT.seqIdx],fb=document.getElementById('fb');
  if(v===n){
    ACT.seqIdx++;setPf(Math.round(100*ACT.seqIdx/ch.seq.length));
    if(ACT.seqIdx>=ch.seq.length){setTimeout(chSuccess,700);}
    else{fb.className='feedback ok';fb.textContent='✅ Parfait ! Suivant !';setTimeout(()=>rFSeqStep(ch,ACT.world),800);}
  }else{
    ACT.attempts++;ACT.perfect=false;setErr(ACT.attempts);
    fb.className='feedback ko';fb.textContent='❌ Soroban: '+v+'. Cherche encore !';errSnd();
  }
}

// =============================================================
//  SUCCÈS
// =============================================================
function chSuccess(){
  stopTimer();
  const{ch,world,perfect}=ACT;
  const bonus=perfect?Math.floor(ch.pts*.5):0;
  const total=ch.pts+bonus;
  const already=S.comp[ch.id];
  if(!already){
    S.points+=total;S.done++;S.comp[ch.id]=true;
    sd.today++;sd.sessPoints+=total;
    if(perfect)sd.perfect++;
    checkBadges();save();
  }
  confetti();okSnd();
  openModal(
    '🎉',
    already?'Défi revu !':'Défi réussi !',
    already?null:'+'+total+'pts'+(perfect?' (Parfait ! +'+bonus+')':''),
    already?'Bonne révision !':perfect?'Aucune erreur, incroyable !':'Continue comme ça !'
  );
  ACT=null;updateHdr();
}

// =============================================================
//  CHRONO
// =============================================================
function startTimer(s){
  stopTimer();let t=s;
  const el=document.getElementById('chrono');if(el)el.textContent=t;
  timerID=setInterval(()=>{
    t--;
    const el=document.getElementById('chrono');
    if(el){el.textContent=t;el.classList.toggle('danger',t<=5);}
    if(t<=0){stopTimer();timeUp();}
  },1000);
}
function stopTimer(){if(timerID){clearInterval(timerID);timerID=null;}}
function timeUp(){
  const fb=document.getElementById('fb');
  if(fb){fb.className='feedback ko';fb.textContent='⏰ Temps écoulé ! Réessaie !';}
  errSnd();
  if(ACT){ACT.attempts++;ACT.perfect=false;setErr(ACT.attempts);}
  setTimeout(()=>{if(ACT)renderCh();},1600);
}

// =============================================================
//  BADGES
// =============================================================
function checkBadges(){
  BADGES.forEach(b=>{
    if(!S.badges[b.id]&&b.cond(S)){
      S.badges[b.id]=true;
      setTimeout(()=>openModal(b.em,'Nouveau badge !',null,'Tu as débloqué : "'+b.name+'"'),800);
    }
  });
}

// =============================================================
//  REWARDS & STATS
// =============================================================
function renderRewards(){
  document.getElementById('rStreak').textContent=S.streak;
  document.getElementById('badgeGrid').innerHTML=BADGES.map(b=>`
    <div class="badge-item${S.badges[b.id]?' ok':''}">
      <div class="badge-em">${b.em}</div>
      <div class="badge-name">${b.name}</div>
      <div class="badge-cond">${b.hint}</div>
    </div>`).join('');
  document.getElementById('missionList').innerHTML=MISSIONS.map(m=>{const d=m.check(sd);return`
    <div class="mission-item${d?' done':''}">
      <span style="font-size:13px;font-weight:600">${m.text}</span>
      <span style="font-size:12px;font-weight:700;color:${d?'#065f46':'#e85d04'}">${d?'✅ ':''} +${m.xp}pts</span>
    </div>`;}).join('');
}
function renderStats(){
  document.getElementById('stPts').textContent=S.points;
  document.getElementById('stDone').textContent=S.done;
  document.getElementById('stBest').textContent=S.bestStreak;
  document.getElementById('stBadge').textContent=Object.keys(S.badges||{}).length;
  document.getElementById('worldProg').innerHTML=WORLDS.map(w=>{
    const done=w.ch.filter(c=>S.comp[c.id]).length;
    const pct=Math.round(100*done/w.ch.length);
    return`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span>${w.em} ${w.name}</span><span>${done}/${w.ch.length}</span>
      </div>
      <div style="height:8px;background:#eee;border-radius:4px;overflow:hidden">
        <div class="c${w.ci}" style="height:100%;width:${pct}%;border-radius:4px;transition:.4s"></div>
      </div>
    </div>`;}).join('');
}

// =============================================================
//  MODAL
// =============================================================
function openModal(em,title,pts,text){
  document.getElementById('mEm').textContent=em;
  document.getElementById('mTitle').textContent=title;
  const pe=document.getElementById('mPts');
  if(pts){pe.textContent=pts;pe.style.display='block';}else pe.style.display='none';
  document.getElementById('mText').textContent=text||'';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');goNav(0);}

// =============================================================
//  SONS
// =============================================================
function beadSnd(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.value=500+Math.random()*300;
    g.gain.setValueAtTime(.1,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.07);
    o.start();o.stop(ctx.currentTime+.08);
  }catch(e){}
}
function okSnd(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1047].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.18,ctx.currentTime+i*.1);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.1+.18);
      o.start(ctx.currentTime+i*.1);o.stop(ctx.currentTime+i*.1+.2);
    });
  }catch(e){}
}
function errSnd(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [300,240].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(.12,ctx.currentTime+i*.14);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.14+.18);
      o.start(ctx.currentTime+i*.14);o.stop(ctx.currentTime+i*.14+.2);
    });
  }catch(e){}
}

// =============================================================
//  CONFETTI
// =============================================================
const CC=['#e85d04','#f48c06','#43e97b','#4facfe','#f093fb','#ffd89b','#ff6b9d','#a78bfa'];
function confetti(){
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    el.className='cpiece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${CC[i%CC.length]};`+
      `animation-duration:${.9+Math.random()*1.3}s;animation-delay:${Math.random()*.5}s;`+
      `transform:rotate(${Math.random()*360}deg);width:${6+Math.random()*6}px;height:${10+Math.random()*8}px`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2600);
  }
}

// =============================================================
//  RESET
// =============================================================
function resetGame(){
  if(confirm('Effacer toute la progression ?')){localStorage.removeItem('sdv3');location.reload();}
}

// =============================================================
//  INIT
// =============================================================
updateHdr();renderMap();
</script>
