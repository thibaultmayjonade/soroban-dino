<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Soroban Dino 🦕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a3a1a;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;}
.app{width:100%;max-width:480px;min-height:100vh;background:#fff;display:flex;flex-direction:column;position:relative;}
/* HEADER */
.hdr{background:linear-gradient(135deg,#e85d04,#f48c06);padding:14px 20px 12px;color:#fff;text-align:center;position:relative;overflow:hidden;flex-shrink:0;}
.hdr::after{content:'🦕';position:absolute;right:12px;top:8px;font-size:44px;opacity:.18;}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.3px;}
.hdr-stats{display:flex;justify-content:center;gap:20px;margin-top:6px;}
.hdr-stat{font-size:12px;opacity:.9;}
.hdr-stat span{font-weight:700;font-size:14px;}
/* NAV */
.nav{display:flex;border-bottom:2px solid #f0f0f0;flex-shrink:0;}
.nav-btn{flex:1;padding:10px 4px;background:none;border:none;font-size:11px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;}
.nav-btn.active{color:#e85d04;border-color:#e85d04;}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:16px;}
.screen{display:none;}
.screen.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* WORLD MAP */
.worlds-title{font-size:15px;font-weight:700;color:#333;margin-bottom:12px;}
.world-card{border-radius:14px;margin-bottom:12px;overflow:hidden;border:2px solid #eee;transition:.2s;}
.world-card.locked{opacity:.55;}
.world-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
.world-icon{font-size:32px;flex-shrink:0;}
.world-info{flex:1;}
.world-name{font-size:15px;font-weight:700;color:#222;}
.world-sub{font-size:12px;color:#777;margin-top:2px;}
.world-prog{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;flex-shrink:0;}
.world-challenges{padding:0 16px 12px;display:none;}
.world-challenges.open{display:block;}
.ch-btn{width:100%;padding:12px 14px;margin-bottom:8px;border-radius:10px;border:2px solid #eee;background:#fafafa;font-size:13px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.15s;}
.ch-btn:hover:not(:disabled){border-color:#e85d04;background:#fff8f4;}
.ch-btn.done{background:linear-gradient(90deg,#d1fae5,#a7f3d0);border-color:#34d399;color:#065f46;}
.ch-btn.locked{opacity:.4;cursor:not-allowed;}
.ch-type{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:700;text-transform:uppercase;}
/* SOROBAN */
.soroban-wrap{background:linear-gradient(160deg,#f5deb3,#c8970a);border-radius:14px;padding:16px 12px 12px;border:4px solid #8b6508;margin:12px 0;position:relative;}
.soroban-label{text-align:center;font-size:11px;font-weight:700;color:#5a3e00;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;}
.soroban-rods{display:flex;gap:6px;justify-content:center;}
.rod{display:flex;flex-direction:column;align-items:center;flex:1;max-width:56px;}
.rod-place{font-size:9px;font-weight:700;color:#5a3e00;margin-top:5px;text-align:center;}
.bead-heaven{width:38px;height:38px;border-radius:50%;background:#c0392b;border:3px solid #922b21;cursor:pointer;transition:.15s;margin:3px 0;}
.bead-heaven.off{background:#e8b5b0;border-color:#d9a09a;}
.divider{width:100%;height:3px;background:#5a3e00;border-radius:2px;margin:5px 0;}
.bead-earth{width:38px;height:38px;border-radius:50%;background:#e67e22;border:3px solid #b05a10;cursor:pointer;transition:.15s;margin:3px 0;}
.bead-earth.off{background:#f0d5b8;border-color:#e0c09a;}
.bead-heaven:active,.bead-earth:active{transform:scale(1.12);}
.soroban-value{text-align:center;font-size:28px;font-weight:800;color:#5a3e00;margin-top:8px;}
/* CHALLENGE UI */
.ch-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.ch-world-tag{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;color:#fff;}
.ch-score-tag{font-size:13px;font-weight:700;background:#f0f0f0;padding:4px 10px;border-radius:20px;}
.ch-type-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
.pbar{height:10px;background:#eee;border-radius:8px;overflow:hidden;margin-bottom:16px;}
.pfill{height:100%;background:linear-gradient(90deg,#e85d04,#f48c06);transition:.35s;}
.ch-question{background:#f8f9fa;border-radius:12px;padding:16px;text-align:center;margin-bottom:14px;border:2px solid #eee;}
.ch-q-label{font-size:12px;color:#777;margin-bottom:6px;}
.ch-q-main{font-size:40px;font-weight:800;color:#222;line-height:1.1;}
.ch-q-sub{font-size:14px;color:#555;margin-top:6px;}
.ans-row{display:flex;gap:8px;margin-bottom:12px;}
.ans-input{flex:1;padding:12px;border:2px solid #ddd;border-radius:10px;font-size:18px;font-weight:700;text-align:center;}
.ans-input:focus{outline:none;border-color:#e85d04;}
.btn-primary{flex:1;padding:12px;background:linear-gradient(135deg,#e85d04,#f48c06);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-primary:active{transform:scale(.97);}
.btn-secondary{width:100%;padding:11px;background:#f0f0f0;color:#555;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.feedback{padding:14px;border-radius:12px;text-align:center;font-size:15px;font-weight:700;margin-bottom:10px;display:none;}
.feedback.ok{background:#d1fae5;color:#065f46;display:block;}
.feedback.ko{background:#fee2e2;color:#991b1b;display:block;}
/* MINIGAME TYPES */
.qcm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.qcm-btn{padding:18px 8px;border:2px solid #ddd;border-radius:12px;background:#fafafa;font-size:22px;font-weight:800;cursor:pointer;transition:.15s;text-align:center;}
.qcm-btn:hover{border-color:#e85d04;background:#fff8f4;}
.qcm-btn.correct{background:#d1fae5;border-color:#34d399;color:#065f46;}
.qcm-btn.wrong{background:#fee2e2;border-color:#f87171;color:#991b1b;}
.chrono{text-align:center;font-size:36px;font-weight:800;color:#e85d04;margin:8px 0;}
.chrono.danger{color:#dc2626;animation:pulse .5s infinite;}
@keyframes pulse{50%{opacity:.5}}
.seq-display{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0;}
.seq-num{width:52px;height:52px;border-radius:10px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#333;border:2px solid #ddd;}
.seq-num.active{background:#e85d04;color:#fff;border-color:#c0440a;}
/* REWARDS */
.section-title{font-size:15px;font-weight:700;color:#333;margin:16px 0 10px;}
.streak-banner{background:linear-gradient(135deg,#fff3cd,#ffd966);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:16px;border:2px solid #f0b800;}
.streak-fire{font-size:44px;}
.streak-val{font-size:32px;font-weight:800;color:#b45309;}
.streak-label{font-size:12px;color:#92400e;font-weight:600;}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.badge-item{border-radius:12px;border:2px solid #eee;padding:12px 8px;text-align:center;background:#fafafa;}
.badge-item.unlocked{background:linear-gradient(135deg,#fffbeb,#fde68a);border-color:#f59e0b;}
.badge-item.locked{opacity:.45;}
.badge-em{font-size:34px;margin-bottom:4px;}
.badge-name{font-size:11px;font-weight:700;color:#444;}
.badge-cond{font-size:10px;color:#888;margin-top:2px;}
.mission-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.mission-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:10px;border:2px solid #eee;background:#fafafa;}
.mission-item.done{background:#d1fae5;border-color:#34d399;}
.mission-text{font-size:13px;font-weight:600;color:#333;}
.mission-xp{font-size:12px;font-weight:700;color:#e85d04;}
.mission-item.done .mission-xp{color:#065f46;}
/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-box{background:#f8f9fa;border-radius:12px;padding:14px;text-align:center;border:2px solid #eee;}
.stat-val{font-size:28px;font-weight:800;color:#e85d04;}
.stat-label{font-size:11px;color:#777;font-weight:600;margin-top:2px;}
/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal.open{display:flex;}
.modal-box{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;max-width:320px;width:100%;animation:popin .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popin{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal-em{font-size:72px;margin-bottom:12px;}
.modal-title{font-size:22px;font-weight:800;color:#222;margin-bottom:8px;}
.modal-text{font-size:14px;color:#666;margin-bottom:20px;line-height:1.5;}
.modal-pts{font-size:32px;font-weight:800;color:#e85d04;margin-bottom:16px;}
/* CONFETTI */
.confetti-piece{position:fixed;width:8px;height:14px;border-radius:3px;animation:fall linear forwards;pointer-events:none;z-index:200;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
/* Couleurs mondes */

.w2{color:#0275d8;} .w2bg{background:#0275d8;} .w2brd{border-color:#0275d8!important;}

.w5{color:#e74c3c;} .w5bg{background:#e74c3c;} .w5brd{border-color:#e74c3c!important;}
.w6{color:#16a085;} .w6bg{background:#16a085;} .w6brd{border-color:#16a085!important;}
.w7{color:#8e44ad;} .w7bg{background:#8e44ad;} .w7brd{border-color:#8e44ad!important;}
.w8{color:#c0392b;} .w8bg{background:#c0392b;} .w8brd{border-color:#c0392b!important;}
.w9{color:#2c3e50;} .w9bg{background:#2c3e50;} .w9brd{border-color:#2c3e50!important;}
.w10{color:#b7950b;} .w10bg{background:#b7950b;} .w10brd{border-color:#b7950b!important;}
</style>
</head>

<div class="app">

    <button class="nav-btn" onclick="nav('stats')">📊 Stats</button>
  </div>
  <div class="main">

    <!-- CARTE DES MONDES -->

      <div class="worlds-title">Choisis ton Monde 🌍</div>

    </div>

    <!-- DÉFI ACTIF -->
    <div class="screen" id="s-challenge">
      <div id="challengeArea"></div>
    </div>

    <!-- RÉCOMPENSES -->
    <div class="screen" id="s-rewards">
      <div class="streak-banner">

          <div class="streak-val" id="rStreak">0</div>

      <div class="section-title">📋 Missions du Jour</div>

    </div>

    <!-- STATS -->
    <div class="screen" id="s-stats">
      <div class="section-title">📊 Tes Statistiques</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="stPts">0</div><div class="stat-label">Points totaux</div></div>

        <div class="stat-box"><div class="stat-val" id="stStreak">0</div><div class="stat-label">Meilleur streak</div></div>
        <div class="stat-box"><div class="stat-val" id="stBadge">0</div><div class="stat-label">Badges</div></div>
      </div>
      <div class="section-title">🌍 Progression par Monde</div>
      <div id="worldProgress"></div>
      <button class="btn-secondary" style="margin-top:20px;color:#dc2626;font-size:12px;" onclick="resetGame()">⚠️ Réinitialiser la progression</button>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-em" id="mEm">🎉</div>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-pts" id="mPts" style="display:none"></div>
    <div class="modal-text" id="mText"></div>
    <button class="btn-primary" style="width:100%" onclick="closeModal()">Continuer →</button>
  </div>
</div>

function defaultState(){
  return {
    points:0, streak:0, bestStreak:0, lastDate:'',
    completed:{}, worldsDone:{},
    unlockedBadges:[], unlockedBadgesSet:{},
    completedCount:0
  };
}
function loadState(){
  try{return Object.assign(defaultState(), JSON.parse(localStorage.getItem('sdino2')||'{}'));}
  catch(e){return defaultState();}
}
function save(){localStorage.setItem('sdino2', JSON.stringify(S));}

// streak
function checkStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(S.lastDate===today) return;
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  S.streak = S.lastDate===yesterday ? S.streak+1 : 1;
  if(S.streak>S.bestStreak) S.bestStreak=S.streak;
  S.lastDate = today;
  save();
}
checkStreak();

// world unlock
function unlockedLevel(){return S.completedCount||0;}
function worldUnlocked(w){return unlockedLevel()>=w.unlockLevel;}

    div.innerHTML=`

          <div class="world-name">${w.name} ${locked?'🔒':''}</div>

          const isDone=S.completed[ch.id];
          return `<button class="ch-btn ${isDone?'done':''} ${locked?'locked':''}" 
            onclick="${locked?'':'playChallenge(\''+ch.id+'\')'}" ${locked?'disabled':''}>
            <span>${isDone?'✅ ':''} ${ch.label}</span>
            <span class="ch-type ${w.color}bg" style="color:#fff;font-size:10px;padding:2px 8px;border-radius:12px;font-weight:700;">${typeLabel(ch.type)} +${ch.pts}pts</span>

             : ch.op==='mul' ? ch.a*ch.b
             : ch.op==='add3' ? ch.a+ch.b+ch.c
             : ch.n;

  if(ch.op==='expr' || ch.expr) target=ch.n||eval(ch.expr);

  activeChallenge.target=target;

  let questionHTML='';
  if(ch.type==='read'){
    questionHTML=`<div class="ch-q-label">Forme ce nombre sur le soroban :</div>
      <div class="ch-q-main">${target}</div>`;
  } else if(ch.type==='calc'){
    const sym={add:'+',sub:'−',mul:'×',add3:'+'};
    questionHTML=`<div class="ch-q-label">Calcule avec le soroban :</div>
      <div class="ch-q-main">${ch.a} ${sym[ch.op]||'?'} ${ch.b}${ch.c!==undefined?' + '+ch.c:''}</div>
      <div class="ch-q-sub">Pose le résultat sur le soroban puis écris-le</div>`;
  } else if(ch.type==='qcm'){
    questionHTML=`<div class="ch-q-label">Lis le soroban — quelle est la bonne réponse ?</div>
      <div class="ch-q-main">${target}</div>
      <div class="ch-q-sub">Choisis la bonne valeur</div>`;
  } else if(ch.type==='speed'){
    questionHTML=`<div class="ch-q-label">🚀 Défi Vitesse — lis vite !</div>
      <div class="ch-q-main">${target}</div>
      <div class="ch-q-sub">Réponds avant le compte à rebours !</div>`;
  } else if(ch.type==='sequence'){
    questionHTML=`<div class="ch-q-label">Lis la séquence dans l'ordre :</div>
      <div class="seq-display">${ch.seq.map((n,i)=>`<div class="seq-num ${i===0?'active':''}">${n}</div>`).join('')}</div>`;
    activeChallenge.seqIndex=0;
    target=ch.seq[0];
    activeChallenge.target=target;
  } else if(ch.type==='expr'){
    questionHTML=`<div class="ch-q-label">Calcule sur le soroban :</div>
      <div class="ch-q-main">${ch.expr.replace(/\+/g,'+'||'+').replace(/-/g,'−')}</div>`;
  }

  const sorobanRods = buildSorobanHTML(target);
  const isQCM = ch.type==='qcm';
  const isSpeed = ch.type==='speed' || (ch.type==='calc'&&ch.label&&ch.label.includes('Vitesse'));
  const timeLimit = isSpeed ? (ch.label?.includes('10s')?10:ch.label?.includes('12s')?12:15) : 0;

  area.innerHTML=`
    <div class="ch-header">
      <span class="ch-world-tag ${world.color}bg" style="color:#fff">${world.emoji} ${world.name}</span>

    </div>

    ${isSpeed?`<div class="chrono" id="chrono">${timeLimit}</div>`:''}
    <div class="ch-question">${questionHTML}</div>
    ${ch.type!=='sequence'?sorobanRods:''}
    <div class="feedback" id="feedback"></div>
    ${isQCM ? buildQCM(target) : `
    <div class="ans-row">
      <input type="number" class="ans-input" id="ansInput" placeholder="?" onkeydown="if(event.key==='Enter')submitAns()">
      <button class="btn-primary" onclick="submitAns()">OK ✓</button>
    </div>`}

  `;

  if(isSpeed && timeLimit) startTimer(timeLimit);
  document.getElementById('pfill').style.width='0%';

function buildSorobanHTML(n){
  const numStr = String(Math.abs(n)).padStart(5,'0');
  let rods='';
  numStr.split('').forEach((d,i)=>{
    const digit=parseInt(d);
    const heaven= digit>=5;
    const earth = digit%5;
    let beadH=`<div class="bead-heaven${heaven?'':' off'}" onclick="toggleBead(this,'heaven')"></div>`;
    let beadEs='';
    for(let j=0;j<5;j++) beadEs+=`<div class="bead-earth${j<earth?'':' off'}" onclick="toggleBead(this,'earth')"></div>`;
    rods+=`<div class="rod">${beadH}<div class="divider"></div>${beadEs}<div class="rod-place">10<sup>${4-i}</sup></div></div>`;
  });
  return `<div class="soroban-wrap">
    <div class="soroban-label">Soroban — touche les boules pour les bouger</div>
    <div class="soroban-rods" id="sorobanRods">${rods}</div>
    <div class="soroban-value" id="sorobanValue">${n}</div>
  </div>`;
}

function toggleBead(el, type){
  el.classList.toggle('off');
  recalcSoroban();
}

function recalcSoroban(){
  const rods=document.querySelectorAll('.rod');
  let val=0;
  rods.forEach((rod,i)=>{
    const place=Math.pow(10,4-i);
    const heaven=rod.querySelector('.bead-heaven');
    if(heaven&&!heaven.classList.contains('off')) val+=5*place;
    rod.querySelectorAll('.bead-earth').forEach(b=>{
      if(!b.classList.contains('off')) val+=place;
    });
  });
  const el=document.getElementById('sorobanValue');
  if(el) el.textContent=val;
}

function buildQCM(target){
  const options=new Set([target]);
  while(options.size<4){
    const d=Math.floor(Math.random()*5)+1;
    options.add(target+(Math.random()>.5?d:-d));
  }
  const arr=Array.from(options).sort(()=>Math.random()-.5);
  return `<div class="qcm-grid">${arr.map(o=>`<button class="qcm-btn" onclick="submitQCM(${o},this)">${o}</button>`).join('')}</div>`;
}

function submitQCM(val, btn){
  const fb=document.getElementById('feedback');
  if(val===activeChallenge.target){
    btn.classList.add('correct');
    document.querySelectorAll('.qcm-btn').forEach(b=>b.disabled=true);
    fb.className='feedback ok';
    fb.textContent='✅ Bravo, c\'est exact !';
    setTimeout(()=>challengeSuccess(),1200);
  } else {
    btn.classList.add('wrong');
    activeChallenge.attempts++;
    activeChallenge.perfect=false;
    document.getElementById('chAttempts').textContent=activeChallenge.attempts+' erreur(s)';
    fb.className='feedback ko';
    fb.textContent='❌ Essaie encore !';
    sessionData.perfectRun=0;
  }
}

function submitAns(){
  if(timerInterval) clearInterval(timerInterval);
  const input=document.getElementById('ansInput');
  const soroban=document.getElementById('sorobanValue');
  const fb=document.getElementById('feedback');
  const userVal=parseInt(input?.value)||0;
  const sorobanVal=parseInt(soroban?.textContent)||0;
  const target=activeChallenge.target;
  const ch=activeChallenge.ch;

  let correct=false;
  if(ch.type==='read'||ch.type==='speed') correct=(sorobanVal===target && userVal===target);
  else if(ch.type==='calc'||ch.type==='expr') correct=(userVal===target && sorobanVal===target);
  else correct=(userVal===target);

  if(correct){
    fb.className='feedback ok';
    fb.textContent='✅ Parfait ! Bravo !';
    if(ch.type==='sequence'){
      activeChallenge.seqIndex++;
      if(activeChallenge.seqIndex<ch.seq.length){
        const seq=ch.seq;
        activeChallenge.target=seq[activeChallenge.seqIndex];
        document.querySelectorAll('.seq-num').forEach((el,i)=>{
          el.classList.toggle('active',i===activeChallenge.seqIndex);
        });
        input.value='';
        fb.className='feedback ok';
        fb.textContent=`✅ Bien ! Suivant : ${activeChallenge.target}`;
        return;
      }
    }
    setTimeout(()=>challengeSuccess(),1000);
  } else {
    activeChallenge.attempts++;
    activeChallenge.perfect=false;
    sessionData.perfectRun=0;
    document.getElementById('chAttempts').textContent=activeChallenge.attempts+' erreur(s)';
    fb.className='feedback ko';
    fb.textContent=`❌ Pas tout à fait ! Soroban montre: ${sorobanVal}`;
    if(input) input.value='';
  }
}

function challengeSuccess(){
  if(timerInterval) clearInterval(timerInterval);
  const {ch,world,perfect}=activeChallenge;
  const bonus=perfect?Math.floor(ch.pts*.5):0;
  const totalPts=ch.pts+bonus;
  const already=S.completed[ch.id];

  if(!already){
    S.points+=totalPts;
    S.completed[ch.id]=true;
    S.completedCount=(S.completedCount||0)+1;
    if(!S.worldsDone) S.worldsDone={};
    const wDone=world.challenges.every(c=>S.completed[c.id]);
    if(wDone){ S.worldsDone[world.id]=true; sessionData.worldCompleted=true; }
    sessionData.todayChallenges++;
    sessionData.sessionPoints+=totalPts;
    if(perfect) sessionData.perfectRun++;
    if(ch.type==='speed') sessionData.speedWin++;
    checkBadges();
    save();
  }

  fireConfetti();
  playSuccess();

  const pbar=document.getElementById('pfill');
  if(pbar) pbar.style.width='100%';

  openModal(
    perfect?'🌟':'🎉',
    already?'Défi revu!':'Défi réussi!',
    already?null:`+${totalPts} pts${perfect?' (parfait +'+bonus+'!)':''}`,
    already?'Tu maîtrises déjà ce défi.':
      `${perfect?'Aucune erreur — bonus bonus!':'Continue comme ça!'}\nTotal: ${S.points} points`
  );
  activeChallenge=null;
  updateHeader();
}

function startTimer(seconds){
  let t=seconds;
  const el=document.getElementById('chrono');
  if(!el) return;
  timerInterval=setInterval(()=>{
    t--;
    if(el) el.textContent=t;
    if(t<=5 && el) el.classList.add('danger');
    if(t<=0){
      clearInterval(timerInterval);
      const fb=document.getElementById('feedback');
      if(fb){fb.className='feedback ko';fb.textContent='⏰ Temps écoulé!';}
      playError();
      activeChallenge.attempts++;
      activeChallenge.perfect=false;
      setTimeout(()=>nav2('challenge'),1500);
    }
  },1000);
}

function fireConfetti(){
  for(let i=0;i<22;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=COLORS[Math.floor(Math.random()*COLORS.length)];
    el.style.animationDuration=(0.8+Math.random()*1.2)+'s';
    el.style.animationDelay=Math.random()*0.4+'s';
    el.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2500);
  }
}
function playSuccess(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784,1046].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.22,ctx.currentTime+i*.1);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*.1+.18);
      o.start(ctx.currentTime+i*.1);o.stop(ctx.currentTime+i*.1+.2);
    });
  }catch(e){}
}
function playError(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [220,180].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(0.15,ctx.currentTime+i*.15);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*.15+.2);
      o.start(ctx.currentTime+i*.15);o.stop(ctx.currentTime+i*.15+.22);
    });
  }catch(e){}
}

  if(confirm('Effacer toute la progression ?')){

    S=defaultState();
    sessionData={todayChallenges:0,sessionPoints:0,worldCompleted:false,perfectRun:0,speedWin:0};

    nav({currentTarget:document.querySelectorAll('.nav-btn')[0]});
  }
}
